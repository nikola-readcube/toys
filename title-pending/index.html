<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Title Pending</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #faf8f5;
      color: #2c2c2c;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }

    #header {
      text-align: center;
      border-bottom: 2px solid #8b7355;
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    #header h1 {
      font-size: 28px;
      letter-spacing: 1px;
      color: #3a3a3a;
    }

    #header .subtitle {
      font-size: 13px;
      color: #888;
      font-style: italic;
    }

    #header .puzzle-info {
      font-size: 12px;
      color: #aaa;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b7355;
      margin-bottom: 8px;
    }

      padding: 0 0 20px 0;
      margin-bottom: 24px;
      border-bottom: 2px solid #e0dbd3;
      text-align: center;
    }

    #title-area.solved {
      border-bottom-color: #5a8f5a;
    }

    .title-token {
      display: inline;
      vertical-align: baseline;
    }

    .title-token.redacted {
      display: inline-flex;
      align-items: center;
      background: #3a3a3a;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 18px;
      font-weight: bold;
      color: #999;
      letter-spacing: 2px;
      vertical-align: middle;
      margin: 3px 2px;
      height: 34px;
      transition: background 0.15s;
    }

    .hint-mode .title-token.redacted {
      cursor: pointer;
      background: #555;
      outline: 2px solid #c9a832;
      outline-offset: -2px;
    }

    .hint-mode .title-token.redacted:hover {
      background: #6a6a3a;
    }

    .title-token.revealed {
      display: inline-flex;
      align-items: center;
      background: #3d7a3d;
      color: white;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 22px;
      font-weight: bold;
      vertical-align: middle;
      margin: 3px 2px;
      height: 34px;
    }

    .title-token.hint-revealed {
      display: inline-flex;
      align-items: center;
      background: #c9a832;
      color: white;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 22px;
      font-weight: bold;
      vertical-align: middle;
      margin: 3px 2px;
      height: 34px;
    }

    .hint-btn {
      padding: 10px 18px;
      font-size: 15px;
      font-family: inherit;
      background: #c9a832;

      border-radius: 4px;

      white-space: nowrap;
    }

    .hint-btn:hover {

    }

    .hint-btn:disabled {

    .title-token.stop-word {

  <script>
const PUZZLES = [

const STOP_WORDS = new Set([
  'the','a','an','of','in','on','for','and','to','is','s','are','was','were',
  'with','by','at','from','that','this','it','as','or','be','has','had',
  'have','its','but','not','no','which','their','can','do','does','into',
  'than','then','also','been','being','between','both','each','few','more',
  'most','other','some','such','only','over','same','so','these','those',
  'through','under','very','will','about','after','all','because','before',
  'could','did','during','if','may','might','much','should','still','until',
  'up','upon','what','when','where','while','who','would'
]);

function tokenizeTitle(title) {
  const result = [];
  // Split into: alphabetic words (2+ letters), single letters, non-alpha chunks, whitespace
  const parts = title.match(/[a-zA-Z]{2,}|[^a-zA-Z\s]+|[a-zA-Z]|\s+/g) || [];
  let lastWasSpace = true;
  for (let i = 0; i < parts.length; i++) {
    const part = parts[i];
    if (/^\s+$/.test(part)) { lastWasSpace = true; continue; }
    // Alphabetic word (2+ letters)
    if (/^[a-zA-Z]{2,}$/.test(part)) {
      if (STOP_WORDS.has(part.toLowerCase())) {
        result.push({ raw: part, type: 'stop-word', display: part });
      } else {
        result.push({
          raw: part, type: 'guessable', display: part,
          matchWord: part.toLowerCase(), letterCount: part.length
        });
      }
      lastWasSpace = false;
    } else if (/^[a-zA-Z]$/.test(part)) {
      // Single letter — if after space and is a stop word (a, I, s), make it a stop-word
      if (lastWasSpace && STOP_WORDS.has(part.toLowerCase())) {
        result.push({ raw: part, type: 'stop-word', display: part });
      } else {
        // Merge with previous symbol (e.g. 's after apostrophe)
        const prev = result[result.length - 1];
        if (prev && prev.type === 'symbol') {
          prev.display += part; prev.raw += part;
        } else {
          result.push({ raw: part, type: 'symbol', display: part });
        }
      }
      lastWasSpace = false;
    } else {
      // Non-alpha — merge with previous symbol if no space between
      const prev = result[result.length - 1];
      if (!lastWasSpace && prev && prev.type === 'symbol') {
        prev.display += part; prev.raw += part;
      } else {
        result.push({ raw: part, type: 'symbol', display: part });
      }
      lastWasSpace = false;
    }
  }
  return result;
}

function getTodayPuzzleIndex() {
  return Math.floor(Date.now() / 86400000) % PUZZLES.length;
}

function getTodayDateString() {
  return new Date().toISOString().split('T')[0];
}

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00Z');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
}

function loadStats() {
  try {
    const raw = localStorage.getItem('titlePending_stats');
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { played: 0, solved: 0, currentStreak: 0, bestStreak: 0, totalGuesses: 0, history: {} };
}

function saveStats(stats) {
  localStorage.setItem('titlePending_stats', JSON.stringify(stats));
}

function loadCurrent() {
  try {
    const raw = localStorage.getItem('titlePending_current');
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function saveCurrent(current) {
  localStorage.setItem('titlePending_current', JSON.stringify(current));
}

function clearCurrent() {
  localStorage.removeItem('titlePending_current');
}

function finalizeUnsolvedGame(stats, current) {
  const puzzleKey = String(current.puzzleIndex);
  if (!stats.history[puzzleKey]) {
    stats.played++;
    // Don't add to totalGuesses — that only tracks solved games for avg calculation
    stats.history[puzzleKey] = {
      solved: false,
      guesses: current.guesses.length,
      date: current.date || getTodayDateString()
    };
    stats.currentStreak = 0;
    saveStats(stats);
  }
  clearCurrent();
}

function checkStreakOnLoad(stats) {
  let mostRecentDate = null;
  for (const key in stats.history) {
    const entry = stats.history[key];
    if (!mostRecentDate || entry.date > mostRecentDate) {
      mostRecentDate = entry.date;
    }
  }
  if (!mostRecentDate) return;

  const now = new Date();
  const yesterday = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() - 1));
  const yesterdayStr = yesterday.toISOString().split('T')[0];

  const yesterdayEntry = Object.values(stats.history).find(e => e.date === yesterdayStr);
  if (!yesterdayEntry || !yesterdayEntry.solved) {
    if (stats.currentStreak > 0) {
      stats.currentStreak = 0;
      saveStats(stats);
    }
  }
}

function recordWin(stats, puzzleIndex, guessCount) {
  const puzzleKey = String(puzzleIndex);
  stats.played++;
  stats.solved++;
  stats.totalGuesses += guessCount;
  stats.currentStreak++;
  if (stats.currentStreak > stats.bestStreak) {
    stats.bestStreak = stats.currentStreak;
  }
  stats.history[puzzleKey] = {
    solved: true,
    guesses: guessCount,
    date: getTodayDateString()
  };
  saveStats(stats);
}

let gameState = {
  puzzleIndex: 0,
  puzzle: null,
  tokens: [],
  guessableIndices: [],
  revealedIndices: new Set(),
  hintRevealed: new Set(),   // indices auto-solved by hints (shown in yellow)
  hintLetters: {},            // { tokenIndex: numLettersRevealed }
  hintsUsed: 0,
  hintMode: false,
  guesses: [],
  solved: false
};

function initGame() {
  const stats = loadStats();
  const puzzleIndex = getTodayPuzzleIndex();
  const current = loadCurrent();

  if (current && current.puzzleIndex !== puzzleIndex) {
    finalizeUnsolvedGame(stats, current);
  }

  checkStreakOnLoad(stats);

  const puzzleKey = String(puzzleIndex);
  if (stats.history[puzzleKey]) {
    showCompletedState(stats, puzzleIndex);
    return;
  }

  gameState.puzzleIndex = puzzleIndex;
  gameState.puzzle = PUZZLES[puzzleIndex];
  gameState.tokens = tokenizeTitle(gameState.puzzle.title);
  gameState.guessableIndices = gameState.tokens
    .map((t, i) => t.type === 'guessable' ? i : -1)
    .filter(i => i !== -1);
  gameState.revealedIndices = new Set();
  gameState.hintRevealed = new Set();
  gameState.hintLetters = {};
  gameState.hintsUsed = 0;
  gameState.hintMode = false;
  gameState.guesses = [];
  gameState.solved = false;

  if (current && current.puzzleIndex === puzzleIndex) {
    gameState.guesses = current.guesses;
    gameState.hintLetters = current.hintLetters || {};
    gameState.hintsUsed = current.hintsUsed || 0;
    gameState.hintRevealed = new Set(current.hintRevealed || []);
    for (const guess of current.guesses) {
      for (const idx of gameState.guessableIndices) {
        if (gameState.tokens[idx].matchWord === guess.toLowerCase()) {
          gameState.revealedIndices.add(idx);
        }
      }
    }
  }

  renderHeader();
  renderTitle();
  renderAbstract();
  renderStatsBar();
  renderGuessHistory();
  document.getElementById('guess-input').focus();
}

function toggleHintMode() {
  gameState.hintMode = !gameState.hintMode;
  const titleArea = document.getElementById('title-area');
  const btn = document.getElementById('hint-btn');
  if (gameState.hintMode) {
    titleArea.classList.add('hint-mode');
    btn.textContent = 'Cancel';
    btn.style.background = '#999';
    showMessage('Click a word to reveal a letter', 0);
  } else {
    titleArea.classList.remove('hint-mode');
    btn.textContent = 'Hint';
    btn.style.background = '';
    showMessage('', 0);
  }
}

function applyHint(idx) {
  gameState.hintLetters[idx] = (gameState.hintLetters[idx] || 0) + 1;
  gameState.hintsUsed++;

  // If all letters revealed → auto-solve in yellow
  if (gameState.hintLetters[idx] >= gameState.tokens[idx].letterCount) {
    gameState.hintRevealed.add(idx);
  }

  // Exit hint mode
  gameState.hintMode = false;
  document.getElementById('title-area').classList.remove('hint-mode');
  document.getElementById('hint-btn').textContent = 'Hint';
  document.getElementById('hint-btn').style.background = '';
  showMessage('', 0);

  saveCurrentState();
  renderTitle();
  renderStatsBar();

  // Check if all words are now found (via guesses or hints)
  const totalRevealed = gameState.revealedIndices.size + gameState.hintRevealed.size;
  if (totalRevealed === gameState.guessableIndices.length) {
    handleWin();
  }
}

function updateHintsCounter() {
  const counter = document.getElementById('hints-counter');
  if (gameState.hintsUsed > 0) {
    counter.style.display = '';
    document.getElementById('hints-count').textContent = gameState.hintsUsed;
  } else {
    counter.style.display = 'none';
  }
}

function saveCurrentState() {
  saveCurrent({
    puzzleIndex: gameState.puzzleIndex,
    guesses: gameState.guesses,
    hintLetters: gameState.hintLetters,
    hintsUsed: gameState.hintsUsed,
    hintRevealed: Array.from(gameState.hintRevealed),
    date: getTodayDateString()
  });
}

function renderHeader() {
  document.getElementById('puzzle-number').textContent = gameState.puzzleIndex + 1;
  document.getElementById('puzzle-date').textContent = formatDateDisplay(getTodayDateString());
}

function renderTitle() {
  const container = document.getElementById('title-display');
  container.innerHTML = '';
  for (let i = 0; i < gameState.tokens.length; i++) {
    const token = gameState.tokens[i];
    const span = document.createElement('span');
    span.className = 'title-token';
    if (token.type === 'symbol' || token.type === 'stop-word') {
      span.classList.add('stop-word');
      span.textContent = token.display;
    } else if (gameState.hintRevealed.has(i)) {
      // Auto-solved by hints — yellow
      span.classList.add('hint-revealed');
      span.textContent = token.display;
    } else if (gameState.revealedIndices.has(i)) {
      span.classList.add('revealed');
      span.textContent = token.display;
    } else {
      span.classList.add('redacted');
      const numHinted = gameState.hintLetters[i] || 0;
      const hintText = token.display.substring(0, numHinted);
      const dashes = '–'.repeat(token.letterCount - numHinted);
      span.textContent = hintText + dashes;
      // Click handler for hint mode
      const idx = i;
      span.addEventListener('click', () => {
        if (gameState.hintMode) applyHint(idx);
      });
    }
    container.appendChild(span);
  }
}

function renderAbstract() {
  document.getElementById('abstract-text').textContent = gameState.puzzle.abstract;
}

function renderStatsBar() {
  document.getElementById('guess-count').textContent = gameState.guesses.length;
  document.getElementById('found-count').textContent = gameState.revealedIndices.size + gameState.hintRevealed.size;
  document.getElementById('total-guessable').textContent = gameState.guessableIndices.length;
  updateHintsCounter();
}

function renderGuessHistory() {
  const container = document.getElementById('guess-pills');
  container.innerHTML = '';
  for (let i = gameState.guesses.length - 1; i >= 0; i--) {
    const guess = gameState.guesses[i];
    const pill = document.createElement('span');
    pill.className = 'guess-pill';
    const isHit = gameState.guessableIndices.some(
      idx => gameState.tokens[idx].matchWord === guess.toLowerCase()
    );
    pill.classList.add(isHit ? 'hit' : 'miss');
    pill.textContent = guess;
    container.appendChild(pill);
  }
}

function showMessage(text, duration, cls) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = cls || '';
  if (duration) {
    setTimeout(() => { if (el.textContent === text) { el.textContent = ''; el.className = ''; } }, duration);
  }
}

function handleGuess() {
  const input = document.getElementById('guess-input');
  const raw = input.value.trim();
  input.value = '';
  input.focus();

  // Strip non-alpha characters
  const cleaned = raw.replace(/[^a-zA-Z]/g, '');
  if (!cleaned) return;

  if (gameState.guesses.some(g => g.toLowerCase() === cleaned.toLowerCase())) {
    showMessage('Already guessed!', 2000);
    return;
  }

  gameState.guesses.push(cleaned);

  let found = false;
  for (const idx of gameState.guessableIndices) {
    if (!gameState.revealedIndices.has(idx) && !gameState.hintRevealed.has(idx) && gameState.tokens[idx].matchWord === cleaned.toLowerCase()) {
      gameState.revealedIndices.add(idx);
      found = true;
    }
  }

  saveCurrentState();

  renderTitle();
  renderStatsBar();
  renderGuessHistory();

  if (found) {
    showMessage('Found it!', 1500, 'hit');
  } else {
    showMessage('Not in title', 1500, 'miss');
  }

  const totalRevealed = gameState.revealedIndices.size + gameState.hintRevealed.size;
  if (totalRevealed === gameState.guessableIndices.length) {
    handleWin();
  }
}

function handleWin() {
  gameState.solved = true;
  const stats = loadStats();
  recordWin(stats, gameState.puzzleIndex, gameState.guesses.length);
  clearCurrent();

  document.getElementById('title-area').classList.add('solved');
  document.getElementById('title-label').textContent = 'Title — Solved!';
  renderTitle();
  document.getElementById('game-controls').style.display = 'none';
  showWinSection(stats);
}

function showWinSection(stats) {
  const section = document.getElementById('win-modal');
  const guessCount = gameState.guesses.length;
  const wordCount = gameState.guessableIndices.length;
  const guessedWords = gameState.wordsFoundBeforeGiveUp != null
    ? gameState.wordsFoundBeforeGiveUp
    : gameState.revealedIndices.size;
  const hintWords = gameState.hintRevealed.size;
  const totalFound = guessedWords + hintWords;
  const foundColor = gameState.solved ? '#5a8f5a' : '#c0392b';

  document.getElementById('modal-title').textContent = gameState.puzzle.title;
  document.getElementById('paper-link').href = 'https://www.readcube.com/articles/' + encodeURIComponent(gameState.puzzle.doi);

  document.getElementById('score-display').innerHTML =
    '<div style="display:flex;justify-content:center;gap:40px;margin:16px 0;">' +
    '<div style="text-align:center"><div style="font-size:32px;font-weight:bold;color:#3a3a3a">' + guessCount + '</div><div style="font-size:12px;color:#888">Guesses</div></div>' +
    '<div style="text-align:center"><div style="font-size:32px;font-weight:bold;color:' + foundColor + '">' + totalFound + '/' + wordCount + '</div><div style="font-size:12px;color:#888">Words Found</div></div>' +
    (hintWords > 0 ? '<div style="text-align:center"><div style="font-size:32px;font-weight:bold;color:#c9a832">' + hintWords + '</div><div style="font-size:12px;color:#888">Hinted</div></div>' : '') +
    '</div>';

  const greenSquares = '🟩'.repeat(guessedWords) + '🟨'.repeat(hintWords) + '⬛'.repeat(wordCount - totalFound);
  const dateDisplay = formatDateDisplay(getTodayDateString());
  const statusEmoji = gameState.solved ? '' : ' ❌';
  const scorecardText = 'Title Pending #' + (gameState.puzzleIndex + 1) + ' 🎓' + statusEmoji + '\n' +
    dateDisplay + '\n' +
    greenSquares + ' ' + totalFound + '/' + wordCount + ' words\n' +
    '📝 ' + guessCount + ' guesses' + (hintWords > 0 ? ' | 💡 ' + hintWords + ' hinted' : '');
  document.getElementById('scorecard-text').textContent = scorecardText;

  renderLifetimeStats(stats);
  section.classList.add('visible');
}

function renderLifetimeStats(stats) {
  const container = document.getElementById('lifetime-stats');
  const winRate = stats.played > 0 ? Math.round((stats.solved / stats.played) * 100) : 0;
  const avgGuesses = stats.solved > 0 ? (stats.totalGuesses / stats.solved).toFixed(1) : '—';

  container.innerHTML = [
    { value: stats.played, label: 'Played' },
    { value: stats.solved, label: 'Solved' },
    { value: winRate + '%', label: 'Win Rate' },
    { value: stats.currentStreak, label: 'Streak' },
    { value: stats.bestStreak, label: 'Best' },
    { value: avgGuesses, label: 'Avg Guesses' }
  ].map(s =>
    '<div class="stat-item"><div class="stat-value">' + s.value + '</div><div class="stat-label">' + s.label + '</div></div>'
  ).join('');
}

document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById('scorecard-text').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showCopied()).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
});

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('win-modal').classList.remove('visible');
});

document.getElementById('win-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('win-modal').classList.remove('visible');
  }
});

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  document.body.removeChild(textarea);
  showCopied();
}

function showCopied() {
  const btn = document.getElementById('copy-btn');
  btn.textContent = '✓ Copied!';
  setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
}

function showCompletedState(stats, puzzleIndex) {
  const puzzle = PUZZLES[puzzleIndex];
  const tokens = tokenizeTitle(puzzle.title);
  const entry = stats.history[String(puzzleIndex)];

  gameState.puzzleIndex = puzzleIndex;
  gameState.puzzle = puzzle;
  gameState.tokens = tokens;
  gameState.guessableIndices = tokens.map((t, i) => t.type === 'guessable' ? i : -1).filter(i => i !== -1);
  // Always reveal all words in completed state (show the answer)
  gameState.revealedIndices = new Set(gameState.guessableIndices);
  gameState.solved = entry.solved;

  renderHeader();
  renderTitle();
  renderAbstract();

  document.getElementById('game-controls').style.display = 'none';
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('guess-history').style.display = 'none';

  if (entry.solved) {
    document.getElementById('title-area').classList.add('solved');
    document.getElementById('title-label').textContent = 'Title — Solved!';
  } else {
    document.getElementById('title-label').textContent = 'Title';
  }

  // Use stored guess count for display
  gameState.guesses = { length: entry.guesses };
  showWinSection(stats);
}

document.getElementById('guess-btn').addEventListener('click', handleGuess);
document.getElementById('guess-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleGuess();
});

document.getElementById('hint-btn').addEventListener('click', () => {
  toggleHintMode();
});

document.getElementById('give-up-btn').addEventListener('click', () => {
  if (!confirm('Are you sure you want to give up?')) return;
  handleGiveUp();
});

function handleGiveUp() {
  gameState.solved = false;
  gameState.wordsFoundBeforeGiveUp = gameState.revealedIndices.size;
  const stats = loadStats();
  const puzzleKey = String(gameState.puzzleIndex);
  stats.played++;
  stats.history[puzzleKey] = {
    solved: false,
    guesses: gameState.guesses.length,
    found: gameState.wordsFoundBeforeGiveUp,
    date: getTodayDateString()
  };
  stats.currentStreak = 0;
  saveStats(stats);
  clearCurrent();

  // Reveal all words
  for (const idx of gameState.guessableIndices) {
    gameState.revealedIndices.add(idx);
  }

  document.getElementById('title-label').textContent = 'Title';
  renderTitle();
  document.getElementById('game-controls').style.display = 'none';
  document.getElementById('give-up-btn').style.display = 'none';
  showWinSection(stats);
}

initGame();
  </script>
