<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Title Pending</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #faf8f5;
      color: #2c2c2c;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }

    #header {
      text-align: center;
      border-bottom: 2px solid #8b7355;
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    #header h1 {
      font-size: 28px;
      letter-spacing: 1px;
      color: #3a3a3a;
    }

    #header .subtitle {
      font-size: 13px;
      color: #888;
      font-style: italic;
    }

    #header .puzzle-info {
      font-size: 12px;
      color: #aaa;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b7355;
      margin-bottom: 8px;
    }

    #title-area {
      padding: 0 0 20px 0;
      margin-bottom: 24px;
      border-bottom: 2px solid #e0dbd3;
      text-align: center;
    }

    #title-area.solved {
      border-bottom-color: #5a8f5a;
    }

    .title-token {
      display: inline-flex;
      vertical-align: baseline;
    }

    .title-token.redacted {
      display: inline-flex;
      align-items: center;
      background: #3a3a3a;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 18px;
      font-weight: bold;
      color: #999;
      letter-spacing: 2px;
      vertical-align: middle;
      margin: 3px 2px;
      height: 34px;
      transition: background 0.15s;
    }

    .hint-mode .title-token.redacted {
      cursor: pointer;
      background: #555;
      outline: 2px solid #c9a832;
      outline-offset: -2px;
    }

    .hint-mode .title-token.redacted:hover {
      background: #6a6a3a;
    }

    .title-token.revealed {
      display: inline-flex;
      align-items: center;
      background: #3d7a3d;
      color: white;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 22px;
      font-weight: bold;
      vertical-align: middle;
      margin: 3px 2px;
      height: 34px;
    }

    .title-token.hint-revealed {
      display: inline-flex;
      align-items: center;
      background: #c9a832;
      color: white;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 22px;
      font-weight: bold;
      vertical-align: middle;
      margin: 3px 2px;
      height: 34px;
    }

    .hint-btn {
      padding: 10px 18px;
      font-size: 15px;
      font-family: inherit;
      background: #c9a832;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    .hint-btn:hover {
      background: #b89828;
    }

    .hint-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .title-token.stop-word {
      color: #777;
      margin: 0 2px;
      font-size: 22px;
      vertical-align: middle;
    }

    .title-token.symbol {
      color: #777;
      margin: 0 1px;
      font-size: 22px;
      vertical-align: middle;
    }

    #abstract-area {
      margin-bottom: 24px;
    }

    #abstract-text {
      font-size: 15px;
      line-height: 1.8;
      color: #444;
    }

    .abstract-redacted {
      display: inline-block;
      background: #ccc;
      border-radius: 3px;
      height: 1em;
      vertical-align: middle;
      margin: 0 1px;
    }

    .abstract-revealed {
      color: #3d7a3d;
      font-weight: 600;
    }

    #input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      align-items: center;
    }

    #guess-input {
      flex: 1;
      padding: 10px 14px;
      font-size: 16px;
      font-family: inherit;
      border: 2px solid #d4c9b0;
      border-radius: 4px;
      background: white;
      outline: none;
    }

    #guess-input:focus {
      border-color: #8b7355;
    }

    #guess-btn {
      padding: 10px 24px;
      font-size: 15px;
      font-family: inherit;
      background: #8b7355;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #guess-btn:hover {
      background: #7a6548;
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      font-style: italic;
      margin-bottom: 16px;
    }

    #message {
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 20px;
    }

    #message.hit { color: #5a8f5a; }
    #message.miss { color: #999; }

    .give-up-btn {
      padding: 5px 14px;
      font-size: 12px;
      font-family: inherit;
      background: #f0ece4;
      color: #8b7355;
      border: 1px solid #d4c9b0;
      border-radius: 3px;
      cursor: pointer;
    }

    .give-up-btn:hover {
      background: #e8e3da;
      border-color: #8b7355;
    }

    #stats-bar {
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: #777;
      margin-bottom: 20px;
    }

    #stats-bar strong {
      color: #3a3a3a;
    }

    #guess-history {
      border-top: 1px solid #e0dbd3;
      padding-top: 16px;
    }

    .guess-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .guess-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 13px;
    }

    .guess-pill.hit {
      background: #5a8f5a;
      color: white;
    }

    .guess-pill.miss {
      background: #e8e3da;
      color: #999;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal-content {
      background: #faf8f5;
      border-radius: 8px;
      padding: 32px 28px;
      max-width: 480px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      font-size: 22px;
      color: #999;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .modal-close:hover {
      color: #3a3a3a;
    }

    .paper-link {
      display: inline-block;
      padding: 10px 24px;
      background: #3d7a3d;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
    }

    .paper-link:hover {
      background: #2e6b2e;
    }

    .scorecard-box {
      background: #f8f6f2;
      border-radius: 4px;
      padding: 14px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #555;
      margin: 16px 0;
    }

    .copy-btn {
      padding: 4px 10px;
      font-size: 11px;
      font-family: inherit;
      background: #8b7355;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .copy-btn:hover {
      background: #7a6548;
    }


    @media (max-width: 480px) {
      .container {
        padding: 12px;
      }

      #header h1 {
        font-size: 22px;
      }

      #abstract-text {
        font-size: 14px;
      }

      #input-area {
        flex-direction: column;
        align-items: stretch;
      }

      #guess-btn {
        width: 100%;
      }

      #stats-bar {
        gap: 12px;
        font-size: 12px;
      }

      .stat-item .stat-value {
        font-size: 20px;
      }
    }

    /* Archive button */
    .archive-btn {
      padding: 5px 14px;
      font-size: 12px;
      font-family: inherit;
      background: #f0ece4;
      color: #8b7355;
      border: 1px solid #d4c9b0;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 10px;
    }

    .archive-btn:hover {
      background: #e8e3da;
      border-color: #8b7355;
    }

    /* Archive modal */
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin: 16px 0;
    }

    .archive-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      border: 1px solid #d4c9b0;
      background: #f0ece4;
      color: #8b7355;
      transition: border-color 0.15s, background 0.15s;
    }

    .archive-cell:hover {
      border-color: #8b7355;
      background: #e8e3da;
    }

    .archive-cell.current {
      border-color: #8b7355;
      border-width: 2px;
    }

    .archive-cell.solved {
      background: #5a8f5a;
      color: white;
      border-color: #4a7a4a;
    }

    .archive-cell.failed {
      background: #c0392b;
      color: white;
      border-color: #a33025;
    }

    .archive-legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      font-size: 11px;
      color: #888;
      margin-top: 12px;
    }

    .archive-legend span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .archive-legend .swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="header">
      <h1>TITLE PENDING</h1>
      <p class="subtitle">Guess the paper title from the abstract</p>
      <p class="puzzle-info">Puzzle #<span id="puzzle-number"></span> — <span id="puzzle-date"></span></p>
      <button class="archive-btn" id="archive-btn">Archive</button>
    </div>

    <div id="game-controls">
      <div id="input-area">
        <input type="text" id="guess-input" placeholder="Enter a word..." autocomplete="off" />
        <button id="guess-btn">Guess</button>
        <button id="hint-btn" class="hint-btn">Hint</button>
      </div>
      <p class="hint">Exact word match (plurals won't match singulars)</p>
      <p id="message"></p>
    </div>

    <div id="title-area">
      <div class="section-label" id="title-label">Title</div>
      <div id="title-display"></div>
    </div>

    <div id="abstract-area">
      <div class="section-label">Abstract</div>
      <p id="abstract-text"></p>
    </div>

    <div id="stats-bar">
      <span>Guesses: <strong id="guess-count">0</strong></span>
      <span>Found: <strong id="found-count">0</strong> / <span id="total-guessable">0</span></span>
      <span id="hints-counter" style="display:none; color:#c9a832;">Hints: <strong id="hints-count">0</strong></span>
      <span style="margin-left: auto; display: flex; gap: 8px;"><button id="give-up-btn" class="give-up-btn">Give Up</button></span>
    </div>

    <div id="guess-history">
      <div class="section-label">Guesses</div>
      <div class="guess-pills" id="guess-pills"></div>
    </div>

  </div>

  <div class="modal-overlay" id="win-modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-title" style="font-size: 20px; font-weight: bold; color: #3a3a3a; text-align: center; margin-bottom: 12px; line-height: 1.4;"></div>
      <div style="text-align: center; margin-bottom: 20px;">
        <a id="paper-link" class="paper-link" href="#" target="_blank">Read the Paper</a>
      </div>
      <div style="text-align: center;">
        <div class="section-label">Your Score</div>
        <div id="score-display"></div>
      </div>
      <div class="scorecard-box" style="display: flex; align-items: flex-start; gap: 10px;">
        <div id="scorecard-text" style="flex: 1;"></div>
        <button class="copy-btn" id="copy-btn">Copy</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="archive-modal">
    <div class="modal-content">
      <button class="modal-close" id="archive-close">&times;</button>
      <div style="font-size: 18px; font-weight: bold; color: #3a3a3a; text-align: center; margin-bottom: 4px;">Puzzle Archive</div>
      <div style="font-size: 12px; color: #888; text-align: center; margin-bottom: 12px;">Click a puzzle to play it</div>
      <div class="archive-grid" id="archive-grid"></div>
      <div class="archive-legend">
        <span><span class="swatch" style="background:#5a8f5a;"></span> Solved</span>
        <span><span class="swatch" style="background:#c0392b;"></span> Gave up</span>
        <span><span class="swatch" style="background:#f0ece4; border: 1px solid #d4c9b0;"></span> Not played</span>
      </div>
    </div>
  </div>

  <script>
let PUZZLES = [];

function tokenizeTitle(title) {
  const result = [];
  // Split on [bracketed] words — brackets mark guessable words
  const parts = title.split(/(\[[^\]]+\])/);
  for (const part of parts) {
    if (!part) continue;
    const bracketMatch = part.match(/^\[([^\]]+)\]$/);
    if (bracketMatch) {
      const word = bracketMatch[1];
      result.push({
        raw: word, type: 'guessable', display: word,
        matchWord: word.toLowerCase(), letterCount: word.length
      });
    } else {
      // Visible text — split into words and symbols for rendering
      const chunks = part.match(/[^\s]+|\s+/g) || [];
      for (const chunk of chunks) {
        if (/^\s+$/.test(chunk)) continue;
        result.push({ raw: chunk, type: 'stop-word', display: chunk });
      }
    }
  }
  return result;
}

function getTodayPuzzleIndex() {
  return Math.floor(Date.now() / 86400000) % PUZZLES.length;
}

function getTodayDateString() {
  return new Date().toISOString().split('T')[0];
}

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00Z');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
}

function loadStats() {
  try {
    const raw = localStorage.getItem('titlePending_v2_stats');
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { history: {} };
}

function saveStats(stats) {
  localStorage.setItem('titlePending_v2_stats', JSON.stringify(stats));
}

function loadCurrent() {
  try {
    const raw = localStorage.getItem('titlePending_v2_current');
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function saveCurrent(current) {
  localStorage.setItem('titlePending_v2_current', JSON.stringify(current));
}

function clearCurrent() {
  localStorage.removeItem('titlePending_v2_current');
}

function finalizeUnsolvedGame(stats, current) {
  const puzzleKey = String(current.puzzleIndex);
  if (!stats.history[puzzleKey]) {
    stats.history[puzzleKey] = {
      solved: false,
      guesses: current.guesses.length,
      date: current.date || getTodayDateString()
    };
    saveStats(stats);
  }
  clearCurrent();
}

function recordWin(stats, puzzleIndex, guessCount) {
  const puzzleKey = String(puzzleIndex);
  stats.history[puzzleKey] = {
    solved: true,
    guesses: guessCount,
    date: getTodayDateString()
  };
  saveStats(stats);
}

let gameState = {
  puzzleIndex: 0,
  puzzle: null,
  tokens: [],
  guessableIndices: [],
  revealedIndices: new Set(),
  hintRevealed: new Set(),   // indices auto-solved by hints (shown in yellow)
  hintLetters: {},            // { tokenIndex: numLettersRevealed }
  hintsUsed: 0,
  hintMode: false,
  guesses: [],
  solved: false,
  isArchive: false  // true when playing a non-daily puzzle from the archive
};

// Archive localStorage helpers (separate from daily stats)
function loadArchiveState(puzzleIndex) {
  try {
    const raw = localStorage.getItem('titlePending_v2_archive_' + puzzleIndex);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function saveArchiveState(puzzleIndex, state) {
  localStorage.setItem('titlePending_v2_archive_' + puzzleIndex, JSON.stringify(state));
}

function getArchiveStatus(puzzleIndex) {
  // Check daily stats
  const stats = loadStats();
  const entry = stats.history[String(puzzleIndex)];
  if (entry) return entry.solved ? 'solved' : 'failed';
  // Check archive-specific state
  const state = loadArchiveState(puzzleIndex);
  if (state && state.completed) return state.solved ? 'solved' : 'failed';
  return null;
}

function buildArchiveGrid() {
  const grid = document.getElementById('archive-grid');
  grid.innerHTML = '';
  const todayIndex = getTodayPuzzleIndex();
  for (let i = 0; i < PUZZLES.length; i++) {
    const cell = document.createElement('div');
    cell.className = 'archive-cell';
    cell.textContent = i + 1;
    if (i === todayIndex) cell.classList.add('current');
    const status = getArchiveStatus(i);
    if (status) cell.classList.add(status);
    cell.addEventListener('click', () => {
      document.getElementById('archive-modal').classList.remove('visible');
      loadArchivePuzzle(i);
    });
    grid.appendChild(cell);
  }
}

function loadArchivePuzzle(index) {
  const todayIndex = getTodayPuzzleIndex();
  if (index === todayIndex) {
    // Just reload the daily game
    gameState.isArchive = false;
    initGame();
    return;
  }

  const puzzle = PUZZLES[index];
  const tokens = tokenizeTitle(puzzle.title);
  const guessableIndices = tokens.map((t, i) => t.type === 'guessable' ? i : -1).filter(i => i !== -1);

  gameState.puzzleIndex = index;
  gameState.puzzle = puzzle;
  gameState.tokens = tokens;
  gameState.guessableIndices = guessableIndices;
  gameState.revealedIndices = new Set();
  gameState.hintRevealed = new Set();
  gameState.hintLetters = {};
  gameState.hintsUsed = 0;
  gameState.hintMode = false;
  gameState.guesses = [];
  gameState.solved = false;
  gameState.isArchive = true;

  // Check if already completed
  const status = getArchiveStatus(index);
  if (status) {
    gameState.revealedIndices = new Set(guessableIndices);
    gameState.solved = status === 'solved';
    showArchiveCompletedState();
    return;
  }

  // Restore in-progress archive state
  const saved = loadArchiveState(index);
  if (saved && !saved.completed) {
    gameState.guesses = saved.guesses || [];
    gameState.hintLetters = saved.hintLetters || {};
    gameState.hintsUsed = saved.hintsUsed || 0;
    gameState.hintRevealed = new Set(saved.hintRevealed || []);
    for (const guess of gameState.guesses) {
      for (const idx of guessableIndices) {
        if (tokens[idx].matchWord === guess.toLowerCase()) {
          gameState.revealedIndices.add(idx);
        }
      }
    }
  }

  // Show the game UI
  document.getElementById('puzzle-number').textContent = index + 1;
  document.getElementById('puzzle-date').textContent = 'Archive';
  document.getElementById('game-controls').style.display = '';
  document.getElementById('stats-bar').style.display = '';
  document.getElementById('guess-history').style.display = '';
  document.getElementById('give-up-btn').style.display = '';
  document.getElementById('title-area').classList.remove('solved');
  document.getElementById('title-label').textContent = 'Title';
  document.getElementById('win-modal').classList.remove('visible');
  renderTitle();
  renderAbstract();
  renderStatsBar();
  renderGuessHistory();
  document.getElementById('guess-input').focus();
}

function showArchiveCompletedState() {
  document.getElementById('puzzle-number').textContent = gameState.puzzleIndex + 1;
  document.getElementById('puzzle-date').textContent = 'Archive';
  renderTitle();
  renderAbstract();

  document.getElementById('game-controls').style.display = 'none';
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('guess-history').style.display = 'none';

  if (gameState.solved) {
    document.getElementById('title-area').classList.add('solved');
    document.getElementById('title-label').textContent = 'Title — Solved!';
  } else {
    document.getElementById('title-area').classList.remove('solved');
    document.getElementById('title-label').textContent = 'Title';
  }

  // Load guess count from archive or daily stats
  const stats = loadStats();
  const dailyEntry = stats.history[String(gameState.puzzleIndex)];
  const archiveEntry = loadArchiveState(gameState.puzzleIndex);
  const guessCount = dailyEntry ? dailyEntry.guesses : (archiveEntry ? (archiveEntry.guesses || []).length : 0);
  const found = dailyEntry ? (dailyEntry.found || (dailyEntry.solved ? gameState.guessableIndices.length : 0))
    : (archiveEntry ? (archiveEntry.guesses || []).filter(g => gameState.guessableIndices.some(idx => gameState.tokens[idx].matchWord === g.toLowerCase())).length : 0);
  gameState.wordsFoundBeforeGiveUp = gameState.solved ? gameState.guessableIndices.length : found;
  gameState.guesses = { length: guessCount };
  showWinSection(stats);
}

function initGame() {
  const stats = loadStats();
  const puzzleIndex = getTodayPuzzleIndex();
  const current = loadCurrent();

  if (current && current.puzzleIndex !== puzzleIndex) {
    finalizeUnsolvedGame(stats, current);
  }

  const puzzleKey = String(puzzleIndex);
  if (stats.history[puzzleKey]) {
    showCompletedState(stats, puzzleIndex);
    return;
  }

  gameState.puzzleIndex = puzzleIndex;
  gameState.puzzle = PUZZLES[puzzleIndex];
  gameState.tokens = tokenizeTitle(gameState.puzzle.title);
  gameState.guessableIndices = gameState.tokens
    .map((t, i) => t.type === 'guessable' ? i : -1)
    .filter(i => i !== -1);
  gameState.revealedIndices = new Set();
  gameState.hintRevealed = new Set();
  gameState.hintLetters = {};
  gameState.hintsUsed = 0;
  gameState.hintMode = false;
  gameState.guesses = [];
  gameState.solved = false;
  gameState.isArchive = false;

  // Re-show UI elements in case returning from archive
  document.getElementById('game-controls').style.display = '';
  document.getElementById('stats-bar').style.display = '';
  document.getElementById('guess-history').style.display = '';
  document.getElementById('give-up-btn').style.display = '';
  document.getElementById('title-area').classList.remove('solved');
  document.getElementById('title-label').textContent = 'Title';
  document.getElementById('win-modal').classList.remove('visible');

  if (current && current.puzzleIndex === puzzleIndex) {
    gameState.guesses = current.guesses;
    gameState.hintLetters = current.hintLetters || {};
    gameState.hintsUsed = current.hintsUsed || 0;
    gameState.hintRevealed = new Set(current.hintRevealed || []);
    for (const guess of current.guesses) {
      for (const idx of gameState.guessableIndices) {
        if (gameState.tokens[idx].matchWord === guess.toLowerCase()) {
          gameState.revealedIndices.add(idx);
        }
      }
    }
  }

  renderHeader();
  renderTitle();
  renderAbstract();
  renderStatsBar();
  renderGuessHistory();
  document.getElementById('guess-input').focus();
}

function toggleHintMode() {
  gameState.hintMode = !gameState.hintMode;
  const titleArea = document.getElementById('title-area');
  const btn = document.getElementById('hint-btn');
  if (gameState.hintMode) {
    titleArea.classList.add('hint-mode');
    btn.textContent = 'Cancel';
    btn.style.background = '#999';
    showMessage('Click a word to reveal a letter', 0);
  } else {
    titleArea.classList.remove('hint-mode');
    btn.textContent = 'Hint';
    btn.style.background = '';
    showMessage('', 0);
  }
}

function applyHint(idx) {
  if (!gameState.hintLetters[idx]) gameState.hintLetters[idx] = [];
  const word = gameState.tokens[idx].display;
  // Pick a random unrevealed letter position
  const unrevealed = [];
  for (let i = 0; i < word.length; i++) {
    if (!gameState.hintLetters[idx].includes(i)) unrevealed.push(i);
  }
  if (unrevealed.length > 0) {
    const pick = unrevealed[Math.floor(Math.random() * unrevealed.length)];
    gameState.hintLetters[idx].push(pick);
  }
  gameState.hintsUsed++;

  // If all letters revealed → auto-solve in yellow
  if (gameState.hintLetters[idx].length >= gameState.tokens[idx].letterCount) {
    gameState.hintRevealed.add(idx);
  }

  // Exit hint mode
  gameState.hintMode = false;
  document.getElementById('title-area').classList.remove('hint-mode');
  document.getElementById('hint-btn').textContent = 'Hint';
  document.getElementById('hint-btn').style.background = '';
  showMessage('', 0);

  saveCurrentState();
  renderTitle();
  renderAbstract();
  renderStatsBar();

  // Check if all words are now found (via guesses or hints)
  const totalRevealed = gameState.revealedIndices.size + gameState.hintRevealed.size;
  if (totalRevealed === gameState.guessableIndices.length) {
    handleWin();
  }
}

function updateHintsCounter() {
  const counter = document.getElementById('hints-counter');
  if (gameState.hintsUsed > 0) {
    counter.style.display = '';
    document.getElementById('hints-count').textContent = gameState.hintsUsed;
  } else {
    counter.style.display = 'none';
  }
}

function saveCurrentState() {
  if (gameState.isArchive) {
    saveArchiveState(gameState.puzzleIndex, {
      guesses: gameState.guesses,
      hintLetters: gameState.hintLetters,
      hintsUsed: gameState.hintsUsed,
      hintRevealed: Array.from(gameState.hintRevealed),
      completed: false,
      solved: false
    });
  } else {
    saveCurrent({
      puzzleIndex: gameState.puzzleIndex,
      guesses: gameState.guesses,
      hintLetters: gameState.hintLetters,
      hintsUsed: gameState.hintsUsed,
      hintRevealed: Array.from(gameState.hintRevealed),
      date: getTodayDateString()
    });
  }
}

function renderHeader() {
  document.getElementById('puzzle-number').textContent = gameState.puzzleIndex + 1;
  document.getElementById('puzzle-date').textContent = formatDateDisplay(getTodayDateString());
}

function renderTitle() {
  const container = document.getElementById('title-display');
  container.innerHTML = '';
  for (let i = 0; i < gameState.tokens.length; i++) {
    const token = gameState.tokens[i];
    const span = document.createElement('span');
    span.className = 'title-token';
    if (token.type === 'symbol' || token.type === 'stop-word') {
      span.classList.add('stop-word');
      span.textContent = token.display;
    } else if (gameState.hintRevealed.has(i)) {
      // Auto-solved by hints — yellow
      span.classList.add('hint-revealed');
      span.textContent = token.display;
    } else if (gameState.revealedIndices.has(i)) {
      span.classList.add('revealed');
      span.textContent = token.display;
    } else {
      span.classList.add('redacted');
      const hintedPositions = gameState.hintLetters[i] || [];
      let text = '';
      for (let c = 0; c < token.letterCount; c++) {
        text += hintedPositions.includes(c) ? token.display[c] : '–';
      }
      span.textContent = text;
      // Click handler for hint mode
      const idx = i;
      span.addEventListener('click', () => {
        if (gameState.hintMode) applyHint(idx);
      });
    }
    container.appendChild(span);
  }
}

function renderAbstract() {
  const container = document.getElementById('abstract-text');
  const abstract = gameState.puzzle.abstract;

  // Collect revealed title words
  const revealedWords = new Set();
  for (const idx of gameState.guessableIndices) {
    if (gameState.revealedIndices.has(idx) || gameState.hintRevealed.has(idx)) {
      revealedWords.add(gameState.tokens[idx].matchWord);
    }
  }

  // Check if all title words revealed — show plain abstract
  const allRevealed = gameState.guessableIndices.every(
    idx => revealedWords.has(gameState.tokens[idx].matchWord)
  );
  if (allRevealed) {
    container.textContent = abstract.replace(/\[([^\]]+)\]/g, '$1');
    return;
  }

  // Parse abstract brackets: [word] marks a hideable word
  container.innerHTML = '';
  const parts = abstract.split(/(\[[^\]]+\])/);
  for (const part of parts) {
    const bracketMatch = part.match(/^\[([^\]]+)\]$/);
    if (bracketMatch) {
      const word = bracketMatch[1];
      if (revealedWords.has(word.toLowerCase())) {
        const span = document.createElement('span');
        span.className = 'abstract-revealed';
        span.textContent = word;
        container.appendChild(span);
      } else {
        const block = document.createElement('span');
        block.className = 'abstract-redacted';
        block.style.width = (word.length * 0.55) + 'em';
        container.appendChild(block);
      }
    } else {
      container.appendChild(document.createTextNode(part));
    }
  }
}

function renderStatsBar() {
  document.getElementById('guess-count').textContent = gameState.guesses.length;
  document.getElementById('found-count').textContent = gameState.revealedIndices.size + gameState.hintRevealed.size;
  document.getElementById('total-guessable').textContent = gameState.guessableIndices.length;
  updateHintsCounter();
}

function renderGuessHistory() {
  const container = document.getElementById('guess-pills');
  container.innerHTML = '';
  for (let i = gameState.guesses.length - 1; i >= 0; i--) {
    const guess = gameState.guesses[i];
    const pill = document.createElement('span');
    pill.className = 'guess-pill';
    const isHit = gameState.guessableIndices.some(
      idx => gameState.tokens[idx].matchWord === guess.toLowerCase()
    );
    pill.classList.add(isHit ? 'hit' : 'miss');
    pill.textContent = guess;
    container.appendChild(pill);
  }
}

function showMessage(text, duration, cls) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = cls || '';
  if (duration) {
    setTimeout(() => { if (el.textContent === text) { el.textContent = ''; el.className = ''; } }, duration);
  }
}

function handleGuess() {
  const input = document.getElementById('guess-input');
  const raw = input.value.trim();
  input.value = '';
  input.focus();

  // Strip non-alpha characters
  const cleaned = raw.replace(/[^a-zA-Z]/g, '');
  if (!cleaned) return;

  if (gameState.guesses.some(g => g.toLowerCase() === cleaned.toLowerCase())) {
    showMessage('Already guessed!', 2000);
    return;
  }

  gameState.guesses.push(cleaned);

  let found = false;
  for (const idx of gameState.guessableIndices) {
    if (!gameState.revealedIndices.has(idx) && !gameState.hintRevealed.has(idx) && gameState.tokens[idx].matchWord === cleaned.toLowerCase()) {
      gameState.revealedIndices.add(idx);
      found = true;
    }
  }

  saveCurrentState();

  renderTitle();
  renderAbstract();
  renderStatsBar();
  renderGuessHistory();

  if (found) {
    showMessage('Found it!', 1500, 'hit');
  } else {
    showMessage('Not in title', 1500, 'miss');
  }

  const totalRevealed = gameState.revealedIndices.size + gameState.hintRevealed.size;
  if (totalRevealed === gameState.guessableIndices.length) {
    handleWin();
  }
}

function handleWin() {
  gameState.solved = true;
  const stats = loadStats();
  if (gameState.isArchive) {
    saveArchiveState(gameState.puzzleIndex, {
      guesses: gameState.guesses,
      hintLetters: gameState.hintLetters,
      hintsUsed: gameState.hintsUsed,
      hintRevealed: Array.from(gameState.hintRevealed),
      completed: true,
      solved: true
    });
  } else {
    recordWin(stats, gameState.puzzleIndex, gameState.guesses.length);
    clearCurrent();
  }

  document.getElementById('title-area').classList.add('solved');
  document.getElementById('title-label').textContent = 'Title — Solved!';
  renderTitle();
  renderAbstract();
  document.getElementById('game-controls').style.display = 'none';
  showWinSection(stats);
}

function showWinSection(stats) {
  const section = document.getElementById('win-modal');
  const guessCount = gameState.guesses.length;
  const wordCount = gameState.guessableIndices.length;
  const guessedWords = gameState.wordsFoundBeforeGiveUp != null
    ? gameState.wordsFoundBeforeGiveUp
    : gameState.revealedIndices.size;
  const hintWords = gameState.hintRevealed.size;
  const totalFound = guessedWords + hintWords;
  const foundColor = gameState.solved ? '#5a8f5a' : '#c0392b';

  document.getElementById('modal-title').textContent = gameState.puzzle.title.replace(/\[([^\]]+)\]/g, '$1');
  document.getElementById('paper-link').href = 'https://www.readcube.com/articles/' + encodeURIComponent(gameState.puzzle.doi);

  document.getElementById('score-display').innerHTML =
    '<div style="display:flex;justify-content:center;gap:40px;margin:16px 0;">' +
    '<div style="text-align:center"><div style="font-size:32px;font-weight:bold;color:#3a3a3a">' + guessCount + '</div><div style="font-size:12px;color:#888">Guesses</div></div>' +
    '<div style="text-align:center"><div style="font-size:32px;font-weight:bold;color:' + foundColor + '">' + totalFound + '/' + wordCount + '</div><div style="font-size:12px;color:#888">Words Found</div></div>' +
    (hintWords > 0 ? '<div style="text-align:center"><div style="font-size:32px;font-weight:bold;color:#c9a832">' + hintWords + '</div><div style="font-size:12px;color:#888">Hinted</div></div>' : '') +
    '</div>';

  const greenSquares = '🟩'.repeat(guessedWords) + '🟨'.repeat(hintWords) + '⬛'.repeat(wordCount - totalFound);
  const dateDisplay = formatDateDisplay(getTodayDateString());
  const statusEmoji = gameState.solved ? '' : ' ❌';
  const scorecardText = 'Title Pending #' + (gameState.puzzleIndex + 1) + ' 🎓' + statusEmoji + '\n' +
    dateDisplay + '\n' +
    greenSquares + ' ' + totalFound + '/' + wordCount + ' words\n' +
    '📝 ' + guessCount + ' guesses' + (hintWords > 0 ? ' | 💡 ' + hintWords + ' hinted' : '');
  document.getElementById('scorecard-text').textContent = scorecardText;

  section.classList.add('visible');
}

document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById('scorecard-text').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showCopied()).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
});

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('win-modal').classList.remove('visible');
});

document.getElementById('win-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('win-modal').classList.remove('visible');
  }
});

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  document.body.removeChild(textarea);
  showCopied();
}

function showCopied() {
  const btn = document.getElementById('copy-btn');
  btn.textContent = '✓ Copied!';
  setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
}

function showCompletedState(stats, puzzleIndex) {
  const puzzle = PUZZLES[puzzleIndex];
  const tokens = tokenizeTitle(puzzle.title);
  const entry = stats.history[String(puzzleIndex)];

  gameState.puzzleIndex = puzzleIndex;
  gameState.puzzle = puzzle;
  gameState.tokens = tokens;
  gameState.guessableIndices = tokens.map((t, i) => t.type === 'guessable' ? i : -1).filter(i => i !== -1);
  // Always reveal all words in completed state (show the answer)
  gameState.revealedIndices = new Set(gameState.guessableIndices);
  gameState.solved = entry.solved;

  renderHeader();
  renderTitle();
  renderAbstract();

  document.getElementById('game-controls').style.display = 'none';
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('guess-history').style.display = 'none';

  if (entry.solved) {
    document.getElementById('title-area').classList.add('solved');
    document.getElementById('title-label').textContent = 'Title — Solved!';
  } else {
    document.getElementById('title-label').textContent = 'Title';
  }

  // Use stored guess count for display
  gameState.guesses = { length: entry.guesses };
  showWinSection(stats);
}

document.getElementById('guess-btn').addEventListener('click', handleGuess);
document.getElementById('guess-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleGuess();
});

document.getElementById('hint-btn').addEventListener('click', () => {
  toggleHintMode();
});

document.getElementById('give-up-btn').addEventListener('click', () => {
  if (!confirm('Are you sure you want to give up?')) return;
  handleGiveUp();
});

function handleGiveUp() {
  gameState.solved = false;
  gameState.wordsFoundBeforeGiveUp = gameState.revealedIndices.size;
  const stats = loadStats();

  if (gameState.isArchive) {
    saveArchiveState(gameState.puzzleIndex, {
      guesses: gameState.guesses,
      hintLetters: gameState.hintLetters,
      hintsUsed: gameState.hintsUsed,
      hintRevealed: Array.from(gameState.hintRevealed),
      completed: true,
      solved: false
    });
  } else {
    const puzzleKey = String(gameState.puzzleIndex);
    stats.history[puzzleKey] = {
      solved: false,
      guesses: gameState.guesses.length,
      found: gameState.wordsFoundBeforeGiveUp,
      date: getTodayDateString()
    };
    saveStats(stats);
    clearCurrent();
  }

  // Reveal all words
  for (const idx of gameState.guessableIndices) {
    gameState.revealedIndices.add(idx);
  }

  document.getElementById('title-label').textContent = 'Title';
  renderTitle();
  renderAbstract();
  document.getElementById('game-controls').style.display = 'none';
  document.getElementById('give-up-btn').style.display = 'none';
  showWinSection(stats);
}

// Archive modal event listeners
document.getElementById('archive-btn').addEventListener('click', () => {
  buildArchiveGrid();
  document.getElementById('archive-modal').classList.add('visible');
});

document.getElementById('archive-close').addEventListener('click', () => {
  document.getElementById('archive-modal').classList.remove('visible');
});

document.getElementById('archive-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('archive-modal').classList.remove('visible');
  }
});

fetch('papers_list.json')
  .then(r => r.json())
  .then(data => {
    PUZZLES = data.map(([doi, title, abstract]) => ({ title, abstract, doi }));
    initGame();
  });
