<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toys</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f6f8fa;
      color: #24292f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #656d76;
      margin-bottom: 2rem;
    }

    .projects {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .projects a {
      display: block;
      padding: 16px 20px;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .projects a:hover {
      border-color: #0969da;
      box-shadow: 0 1px 4px rgba(9, 105, 218, 0.15);
    }

    .projects .name {
      font-weight: 600;
      font-size: 1.1rem;
      color: #0969da;
    }

    .projects .desc {
      color: #656d76;
      font-size: 0.9rem;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Toys</h1>
    <p class="subtitle">Small experiments and side projects.</p>
    <ul class="projects">
      <li>
        <a href="title-pending/">
          <div class="name">Title Pending</div>
          <div class="desc">A paper title generator.</div>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
